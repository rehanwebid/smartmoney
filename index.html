<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Money</title>

    <!-- Font dari luar: Inter (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background-color: #000000;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex-shrink: 0;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 20px 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .balance-container {
            display: flex;
            flex-direction: column;
        }

        .balance-label {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 12px;
            color: #aaaaaa;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .balance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .balance-amount {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: #ffffff;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .level-badge {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 11px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 5px 12px;
            border-radius: 5px;
            letter-spacing: 0.5px;
        }

        .video-outline {
            width: 100%;
            aspect-ratio: 17 / 9;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: transparent;
            overflow: hidden;
            position: relative;
        }

        #chartCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .button-group {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            z-index: 11;
        }

        .btn-small {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 8px;
            color: #aaaaaa;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 3px 8px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
        }

        .btn-small.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .input-nominal {
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            background: rgba(21, 21, 21, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            padding: 14px 18px;
            border-radius: 7px;
            outline: none;
            letter-spacing: 0.5px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .input-nominal::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }

        .input-nominal:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(21, 21, 21, 0.85);
        }

        .action-container {
            display: flex;
            gap: 10px;
        }

        .btn-tarik {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 12px;
            color: #ffffff;
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-tarik:active {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-tarik i {
            font-size: 10px;
        }

        .btn-deposit {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 12px;
            color: #000000;
            background: #ffffff;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-deposit:active {
            background: #e0e0e0;
        }

        .btn-deposit i {
            font-size: 10px;
        }

        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            flex-shrink: 0;
        }

        .history-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-icon {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .history-text {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        .limit-text {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        .history-list-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 20px 20px 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(21, 21, 21, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 12px;
            border-radius: 5px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .history-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-icon-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
        }

        .history-icon-circle.in {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .history-icon-circle.out {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .history-name {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 12px;
            color: #ffffff;
        }

        .history-date {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
        }

        .history-amount {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .history-amount.in {
            color: #ffffff;
        }

        .history-amount.out {
            color: rgba(255, 255, 255, 0.5);
        }

        .history-empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            padding: 20px 0;
            font-family: 'Inter', sans-serif;
        }

        .calc-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #000000;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }

        .calc-fab:active {
            background: #1a1a1a;
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }

        @media (min-width: 1024px) {
            .main-container {
                padding: 30px 30px 0 30px;
                gap: 16px;
            }

            .balance-amount {
                font-size: 26px;
            }

            .level-badge {
                font-size: 13px;
                padding: 6px 14px;
            }

            .video-outline {
                border-radius: 7px;
            }

            .btn-small {
                font-size: 10px;
                padding: 4px 10px;
            }

            .input-nominal {
                font-size: 18px;
                padding: 16px 20px;
            }

            .btn-tarik,
            .btn-deposit {
                font-size: 14px;
                padding: 12px 20px;
            }

            .btn-tarik i,
            .btn-deposit i {
                font-size: 12px;
            }

            .history-list-container {
                padding: 0 30px 30px 30px;
            }

            .calc-fab {
                bottom: 30px;
                right: 30px;
                width: 54px;
                height: 54px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container" id="mainContainer">

        <div class="balance-container">
            <div class="balance-label">Total Saldo</div>
            <div class="balance-row">
                <div class="balance-amount" id="balanceDisplay">Rp. 0</div>
                <div class="level-badge" id="levelDisplay">Lv. 0</div>
            </div>
        </div>

        <div class="video-outline">
            <canvas id="chartCanvas"></canvas>
            <div class="button-group">
                <button class="btn-small" data-period="week">Week</button>
                <button class="btn-small active" data-period="month">Mont</button>
                <button class="btn-small" data-period="year">Years</button>
            </div>
        </div>

        <input type="text" class="input-nominal" id="nominalInput" placeholder="Rp. 0" inputmode="numeric">

        <div class="action-container">
            <button class="btn-tarik" id="btnTarik">
                <i class="fa-solid fa-arrow-down"></i> Tarik
            </button>
            <button class="btn-deposit" id="btnDeposit">
                <i class="fa-solid fa-arrow-up"></i> Deposit
            </button>
        </div>

        <div class="bottom-bar">
            <div class="history-header">
                <i class="fa-solid fa-clock-rotate-left history-icon"></i>
                <span class="history-text">History</span>
            </div>
            <span class="limit-text" id="limitText">0/10</span>
        </div>
    </div>

    <div class="history-list-container" id="historyContainer">
        <div class="history-list" id="historyList">
            <div class="history-empty">Belum ada transaksi</div>
        </div>
    </div>

    <div class="calc-fab" id="calcFab">
        <i class="fa-solid fa-calculator"></i>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'smart_money_finance_data';
            const MAX_TRANSACTIONS = 10;

            const defaultState = {
                balance: 0,
                level: 0,
                activePeriod: 'month',
                transactions: [],
                dailyBalances: {
                    '2026-06-01': 0,
                    '2026-06-02': 0,
                    '2026-06-03': 0,
                    '2026-06-04': 0,
                    '2026-06-05': 0,
                    '2026-06-06': 0,
                    '2026-06-07': 0,
                    '2026-06-08': 0,
                },
                lastCleanupDate: '2026-06-08'
            };

            let state;

            function loadState() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        state = JSON.parse(saved);
                    } else {
                        state = JSON.parse(JSON.stringify(defaultState));
                    }
                } catch (e) {
                    state = JSON.parse(JSON.stringify(defaultState));
                }
            }

            function saveState() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) {}
            }

            function calculateLevel(balance) {
                if (balance < 1000000) return 0;
                return Math.floor(balance / 1000000);
            }

            function formatRupiah(amount) {
                return 'Rp. ' + amount.toLocaleString('id-ID');
            }

            function getToday() {
                const d = new Date();
                return d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0');
            }

            function getNow() {
                const d = new Date();
                return getToday() + ', ' +
                    String(d.getHours()).padStart(2, '0') + ':' +
                    String(d.getMinutes()).padStart(2, '0');
            }

            function cleanupOldTransactions() {
                const today = getToday();
                if (state.lastCleanupDate === today) return;

                const lastDate = state.lastCleanupDate || '2026-06-01';
                const start = new Date(lastDate);
                const end = new Date(today);
                let daysToClean = 0;
                const temp = new Date(start);
                temp.setDate(temp.getDate() + 1);
                while (temp <= end) {
                    daysToClean++;
                    temp.setDate(temp.getDate() + 1);
                }

                for (let i = 0; i < daysToClean; i++) {
                    if (state.transactions.length > 0) {
                        state.transactions.shift();
                    }
                }

                state.lastCleanupDate = today;
                saveState();
            }

            function addTransaction(type, amount) {
                cleanupOldTransactions();

                if (state.transactions.length >= MAX_TRANSACTIONS) {
                    state.transactions.shift();
                }

                const tx = {
                    id: Date.now(),
                    type: type,
                    amount: amount,
                    date: getNow(),
                    name: type === 'in' ? 'Pemasukan' : 'Penarikan'
                };

                state.transactions.push(tx);

                if (type === 'in') {
                    state.balance += amount;
                } else {
                    state.balance -= amount;
                }
                if (state.balance < 0) state.balance = 0;

                state.level = calculateLevel(state.balance);

                const today = getToday();
                state.dailyBalances[today] = state.balance;

                saveState();
                updateAllUI();
                updateChart();
            }

            function updateAllUI() {
                document.getElementById('balanceDisplay').textContent = formatRupiah(state.balance);
                document.getElementById('levelDisplay').textContent = 'Lv. ' + state.level;
                document.getElementById('limitText').textContent = state.transactions.length + '/' +
                    MAX_TRANSACTIONS;
                document.getElementById('nominalInput').value = '';
                document.getElementById('nominalInput').placeholder = 'Rp. 0';
                renderHistory();
            }

            function renderHistory() {
                const historyList = document.getElementById('historyList');
                if (state.transactions.length === 0) {
                    historyList.innerHTML = '<div class="history-empty">Belum ada transaksi</div>';
                    return;
                }

                const reversed = [...state.transactions].reverse();
                historyList.innerHTML = reversed.map(tx => {
                    const typeClass = tx.type === 'in' ? 'in' : 'out';
                    const arrowIcon = tx.type === 'in' ? 'fa-arrow-down' : 'fa-arrow-up';
                    const amountPrefix = tx.type === 'in' ? '+' : '-';
                    return `
                            <div class="history-item">
                                <div class="history-left">
                                    <div class="history-icon-circle ${typeClass}">
                                        <i class="fa-solid ${arrowIcon}"></i>
                                    </div>
                                    <div class="history-info">
                                        <span class="history-name">${tx.name}</span>
                                        <span class="history-date">${tx.date}</span>
                                    </div>
                                </div>
                                <span class="history-amount ${typeClass}">${amountPrefix}${formatRupiah(tx.amount)}</span>
                            </div>
                        `;
                }).join('');
            }

            let chartInstance = null;

            function getChartData(period) {
                const dailyBalances = state.dailyBalances || {};
                const today = getToday();
                const allDates = Object.keys(dailyBalances).sort();

                let filteredDates = [];
                let filteredValues = [];

                const todayDate = new Date(today);

                if (period === 'week') {
                    const sevenDaysAgo = new Date(todayDate);
                    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 6);
                    for (let d = new Date(sevenDaysAgo); d <= todayDate; d.setDate(d.getDate() + 1)) {
                        const dateStr = d.toISOString().split('T')[0];
                        filteredDates.push(dateStr);
                        filteredValues.push(dailyBalances[dateStr] !== undefined ? dailyBalances[dateStr] :
                        null);
                    }
                } else if (period === 'month') {
                    const thirtyDaysAgo = new Date(todayDate);
                    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 29);
                    for (let d = new Date(thirtyDaysAgo); d <= todayDate; d.setDate(d.getDate() + 1)) {
                        const dateStr = d.toISOString().split('T')[0];
                        filteredDates.push(dateStr);
                        filteredValues.push(dailyBalances[dateStr] !== undefined ? dailyBalances[dateStr] :
                        null);
                    }
                } else if (period === 'year') {
                    for (let i = 11; i >= 0; i--) {
                        const d = new Date(todayDate.getFullYear(), todayDate.getMonth() - i, 1);
                        const monthKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                        const monthDates = allDates.filter(date => date.startsWith(monthKey));
                        let val = null;
                        if (monthDates.length > 0) {
                            val = dailyBalances[monthDates[monthDates.length - 1]];
                        }
                        filteredDates.push(monthKey);
                        filteredValues.push(val);
                    }
                }

                let lastVal = 0;
                for (let i = 0; i < filteredValues.length; i++) {
                    if (filteredValues[i] === null) {
                        filteredValues[i] = lastVal;
                    } else {
                        lastVal = filteredValues[i];
                    }
                }

                return {
                    labels: filteredDates,
                    values: filteredValues
                };
            }

            function updateChart() {
                const ctx = document.getElementById('chartCanvas').getContext('2d');
                const chartData = getChartData(state.activePeriod);

                if (chartInstance) {
                    chartInstance.destroy();
                }

                const gradient = ctx.createLinearGradient(0, 0, 0, 350);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.25)');
                gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.12)');
                gradient.addColorStop(0.6, 'rgba(255, 255, 255, 0.04)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.0)');

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartData.labels,
                        datasets: [{
                            data: chartData.values,
                            borderColor: '#ffffff',
                            backgroundColor: gradient,
                            borderWidth: 1.8,
                            tension: 0.4,
                            pointRadius: function(ctx) {
                                const index = ctx.dataIndex;
                                const total = ctx.dataset.data.length;
                                return index === total - 1 ? 3.5 : 0;
                            },
                            pointBackgroundColor: '#ffffff',
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 2,
                            pointHoverRadius: 0,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: {
                            duration: 300
                        },
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                enabled: false
                            }
                        },
                        scales: {
                            x: {
                                display: false,
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    display: false
                                },
                                border: {
                                    display: false
                                }
                            },
                            y: {
                                display: false,
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    display: false
                                },
                                border: {
                                    display: false
                                },
                                min: Math.max(0, Math.min(...chartData.values) - 100000),
                                max: Math.max(...chartData.values) + 100000 || 100000
                            }
                        },
                        elements: {
                            line: {
                                borderJoinStyle: 'round',
                                borderCapStyle: 'round'
                            }
                        },
                        layout: {
                            padding: {
                                top: 8,
                                right: 8,
                                bottom: 8,
                                left: 8
                            }
                        }
                    }
                });
            }

            const nominalInput = document.getElementById('nominalInput');

            nominalInput.addEventListener('focus', function() {
                if (this.value === '' || this.value === 'Rp. 0') {
                    this.value = '';
                }
            });

            nominalInput.addEventListener('blur', function() {
                const raw = this.value.replace(/[^0-9]/g, '');
                if (raw === '' || parseInt(raw) === 0) {
                    this.value = '';
                }
            });

            nominalInput.addEventListener('input', function(e) {
                let val = this.value;
                let raw = val.replace(/[^0-9]/g, '');

                if (raw === '') {
                    this.value = '';
                    return;
                }

                raw = raw.replace(/^0+/, '');
                if (raw === '') raw = '0';

                const num = parseInt(raw);
                this.value = 'Rp. ' + num.toLocaleString('id-ID');
            });

            nominalInput.addEventListener('keydown', function(e) {
                const allowed = [8, 46, 9, 27, 13, 37, 38, 39, 40];
                if (allowed.indexOf(e.keyCode) !== -1) {
                    return;
                }
                if ((e.ctrlKey || e.metaKey) && [65, 67, 86, 88].indexOf(e.keyCode) !== -1) {
                    return;
                }
                if ((e.keyCode < 48 || e.keyCode > 57) && (e.keyCode < 96 || e.keyCode > 105)) {
                    e.preventDefault();
                }
            });

            nominalInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const pasted = (e.clipboardData || window.clipboardData).getData('text');
                const raw = pasted.replace(/[^0-9]/g, '');
                if (raw !== '') {
                    const clean = raw.replace(/^0+/, '') || '0';
                    const num = parseInt(clean);
                    this.value = 'Rp. ' + num.toLocaleString('id-ID');
                }
            });

            document.getElementById('btnDeposit').addEventListener('click', () => {
                const raw = nominalInput.value.replace(/[^0-9]/g, '');
                const amount = parseInt(raw);
                if (isNaN(amount) || amount <= 0) {
                    alert('Masukkan nominal yang valid');
                    return;
                }
                addTransaction('in', amount);
            });

            document.getElementById('btnTarik').addEventListener('click', () => {
                const raw = nominalInput.value.replace(/[^0-9]/g, '');
                const amount = parseInt(raw);
                if (isNaN(amount) || amount <= 0) {
                    alert('Masukkan nominal yang valid');
                    return;
                }
                if (amount > state.balance) {
                    alert('Saldo tidak mencukupi');
                    return;
                }
                addTransaction('out', amount);
            });

            document.querySelectorAll('.btn-small').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.btn-small').forEach(b => b.classList.remove(
                        'active'));
                    btn.classList.add('active');
                    state.activePeriod = btn.dataset.period;
                    saveState();
                    updateChart();
                });
            });

            document.getElementById('calcFab').addEventListener('click', () => {
                try {
                    window.open('calculator://', '_blank');
                } catch (e) {}
                alert('Gunakan kalkulator device Anda atau input nominal di atas.');
            });

            document.getElementById('mainContainer').addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });

            loadState();
            updateAllUI();
            updateChart();

            document.querySelectorAll('.btn-small').forEach(btn => {
                if (btn.dataset.period === state.activePeriod) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            if (!state.dailyBalances) {
                state.dailyBalances = {};
                const today = getToday();
                state.dailyBalances[today] = state.balance;
                saveState();
            }

            cleanupOldTransactions();
            updateAllUI();
            updateChart();

            console.log('Smart Money - Siap');
        })();
    </script>
</body>
</html>
